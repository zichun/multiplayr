<!DOCTYPE html>

    <body style="background-color: #1a202c; color: #e2e8f0; font-family: 'Outfit', sans-serif; margin: 0; padding: 12px;">

        <div id="top-bar" style="background-color: #2d3748; padding: 10px; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
            <strong style="text-transform: uppercase; letter-spacing: 0.05em;">⏳ That Time You Killed Me local debugger</strong>

                <option value="iphone15_L">iPhone 15/16 (Landscape)</option>

        <div style="font-weight: 800; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 6px; color: #a0aec0;">📱 Connected Player Devices (Mobile Viewports):</div>
