<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <title>Multiplayr: P2P Host</title>

        <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.2.2/semantic.min.css"></link>
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
                integrity="sha256-4+XzXVhsDmqanXGHaHvgh1gMQKX40OUvDEBTu8JcmNs="
                crossorigin="anonymous"></script>
        <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
        <script src="rules.bundle.js"></script>
        <script src="lib.bundle.js"></script>
        <script src="host_p2p.bundle.js"></script>
        <script src="https://use.fontawesome.com/0c388157c6.js"></script>
        <style>
            body {
                background: #f4f7f6;
            }
            .rule {
                background: white;
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            }
            .rule header {
                font-size: 1.6em;
                font-weight: bold;
                color: #2c3e50;
                margin-bottom: 10px;
            }
            .rule .desc {
                font-size: 1.1em;
                color: #7f8c8d;
                margin-bottom: 15px;
            }
            .rule button {
                background-color: #27ae60;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 4px;
                font-size: 1.1em;
                cursor: pointer;
            }
            .rule button:hover {
                background-color: #219653;
            }
            #room-info {
                background: #34495e;
                color: white;
                padding: 15px;
                text-align: center;
                font-size: 1.3em;
                border-radius: 6px;
                margin-bottom: 20px;
            }
            #room-id-display {
                font-weight: bold;
                color: #2ecc71;
                font-family: monospace;
            }
        </style>
    </head>
    <body>
        <div id="rules">
            <div id="room-info">
                Initializing WebRTC Peer Room...
            </div>
        </div>
    </body>
</html>
