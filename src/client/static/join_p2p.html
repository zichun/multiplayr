<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <title>Multiplayr: P2P Join</title>

        <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.2.2/semantic.min.css"></link>
        <link rel="stylesheet" href="/css/multiplayr.css" type="text/css" />
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
                integrity="sha256-4+XzXVhsDmqanXGHaHvgh1gMQKX40OUvDEBTu8JcmNs="
                crossorigin="anonymous"></script>
        <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
        <script src="rules.bundle.js"></script>
        <script src="lib.bundle.js"></script>
        <script src="join_p2p.bundle.js"></script>
        <script src="https://use.fontawesome.com/0c388157c6.js"></script>
        <style>
          #container {
             min-height: 100%;
             height: 100%;
             position: relative;
          }
         #join {
             padding: 40px 10px;
             text-align: center;
             max-width: 500px;
             margin: 0 auto;
         }
         #roomId {
             display: block;
             width: 100%;
             padding: 10px 12px;
             margin: 10px auto 25px auto;
             font-size: 1.4em;
             border-radius: 4px;
             border: 1px solid #ccc;
         }
         #join-button {
             padding: 12px 24px;
             font-size: 1.2em;
             background-color: #2980b9;
             color: white;
             border: none;
             border-radius: 4px;
             cursor: pointer;
             width: 100%;
         }
         #join-button:hover {
             background-color: #2471a3;
         }
         #error {
             color: #c0392b;
             font-size: 1.1em;
             margin: 10px 0;
             font-weight: bold;
         }
         #clientId {
             display: block;
             width: 100%;
             padding: 10px 12px;
             margin: 10px auto 25px auto;
             font-size: 1.4em;
             border-radius: 4px;
             border: 1px solid #ccc;
             background-color: #eee;
         }
         label {
             font-size: 1.2em;
             font-weight: bold;
             color: #34495e;
             display: block;
             text-align: left;
         }
        </style>
    </head>
    <body>
      <div id="container">
        <div id="join">
            <div id="error">&nbsp;</div>
            <label for="roomId">Room (Host Peer ID)</label>
            <input type="text" id="roomId" placeholder="Enter Host Peer Room ID" />
            <label for="clientId">My Client ID (Optional / Auto-Generated)</label>
            <input disabled="disabled" type="text" id="clientId" />
            <button id="join-button">Join Game</button>
        </div>
      </div>
    </body>
</html>
